name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  numerical-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Shell syntax
        run: bash -n scripts/hpc4/*.sh scripts/hpc4/*.sbatch
      - name: Installed CLI contracts
        run: |
          prorm config-check configs/smoke.yaml > /dev/null
          prorm closed-form-check > /dev/null
          smart-reward --help > /dev/null
      - name: Test
        run: pytest -q
      - name: Byte-compile
        run: python -m compileall -q src tests scripts/hpc4/stage_hf_assets.py
