name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  numerical-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Shell syntax
        run: bash -n scripts/hpc4/*.sh scripts/hpc4/*.sbatch
      - name: Installed CLI contracts
        run: |
          prorm config-check configs/smoke.yaml > /dev/null
          prorm closed-form-check > /dev/null
          smart-reward --help > /dev/null
      - name: Test
        run: pytest -q
      - name: Byte-compile
        run: python -m compileall -q src tests
