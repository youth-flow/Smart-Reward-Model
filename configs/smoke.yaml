run:
  name: smoke
  seed: 20260722
  num_prompts: 64
  split_sizes: {train: 48, validation: 8, test: 8}

data:
  prompt_dataset: allenai/multipref
  prompt_revision: 12910233a0238a997ebe425656e9dfed7b0ff031
  num_candidates: 4

policy:
  model: Qwen/Qwen2.5-0.5B-Instruct
  revision: 7ae557604adf67be50417f59c2c2f167def9a775
  dtype: float32
  max_prompt_tokens: 384
  max_response_tokens: 128
  sampling:
    do_sample: true
    temperature: 1.0
    top_p: 1.0
    top_k: 0
    min_new_tokens: 0
    repetition_penalty: 1.0
  lora_rank: 4
  lora_alpha: 4
  lora_dropout: 0.0
  lora_layers: [20, 21, 22, 23]
  lora_modules: [q_proj, v_proj]
  trainable_tangent_parameters: lora_B_only

oracle:
  model: Skywork/Skywork-Reward-V2-Qwen3-0.6B
  revision: 8c14a4e9e6321deaf572544339b16b8d6bbe8886
  dtype: float32
  transform: robust_center_scale_then_tanh
  robust_scale: scaled_mad
  robust_scale_floor: 1.0e-6
  probability_floor: 0.25

annotations:
  scheme: geometric_randomized_truncation
  gamma: 0.9

objective:
  beta: 1.0
  damping_relative_to_mean_fisher_diagonal: 0.001
  pcg_tolerance: 1.0e-5
  pcg_max_iterations: 2048

reward_model:
  model: Qwen/Qwen2.5-0.5B-Instruct
  revision: 7ae557604adf67be50417f59c2c2f167def9a775
  dtype: float32
  parameterization: frozen_backbone_linear_head
  feature_pooling: last_response_token
  linear_head_bias: false
  outer_steps: 10
  refresh_dual_every_steps: 1
  optimizer: adamw
  learning_rate: 1.0e-3
  weight_decay: 0.0
  microbatch_size: 16
  max_grad_norm: 1.0

evaluation:
  heldout_moment: per_prompt_unbiased_covariance
  kl_budget: 0.01
  kl_relative_tolerance: 0.05
  kl_probe_candidates: 16
  rollout_candidates_per_prompt: 4
  report_pairwise_accuracy: true
  paired_bootstrap_resamples: 1000
  paired_bootstrap_seed: 20260722
